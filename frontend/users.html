<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Procevia - User Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(145deg, #f1f5f9 0%, #eef2f8 100%); min-height: 100vh; }
        .app-wrapper { display: flex; min-height: 100vh; }
        .sidebar { position: fixed; left: 0; top: 0; height: 100%; width: 260px; background: linear-gradient(135deg, #0891B2, #06B6D4); display: flex; flex-direction: column; z-index: 30; transition: transform 0.3s ease; }
        .main-content { flex: 1; margin-left: 260px; display: flex; flex-direction: column; }
        .topbar { height: 64px; background: rgba(255,255,255,0.85); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(203,213,225,0.6); padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 20; }
        .page-title { font-size: 1.75rem; font-weight: 700; color: #111827; }
        .menu-toggle { display: none; width: 40px; height: 40px; background: rgba(6,182,212,0.1); border-radius: 0.75rem; align-items: center; justify-content: center; cursor: pointer; border: none; }
        .search-wrapper { position: relative; width: 280px; }
        .search-wrapper input { width: 100%; height: 40px; padding-left: 2.5rem; padding-right: 1rem; background: linear-gradient(135deg, #ECFEFF, white); border: 1px solid rgba(6,182,212,0.25); border-radius: 0.75rem; font-size: 0.85rem; outline: none; }
        .search-icon { position: absolute; left: 0.75rem; top: 50%; transform: translateY(-50%); color: #06B6D4; }
        .notif-btn { width: 40px; height: 40px; background: linear-gradient(145deg, rgba(34,211,238,0.1), rgba(6,182,212,0.1)); border-radius: 0.75rem; display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; border: none; }
        .notif-dot { position: absolute; top: 8px; right: 8px; width: 8px; height: 8px; background: #EF4444; border-radius: 50%; border: 2px solid white; }
        .avatar { width: 40px; height: 40px; background: linear-gradient(135deg, #22D3EE, #06B6D4); border-radius: 0.75rem; display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; cursor: pointer; }
        .right-section { display: flex; gap: 1rem; align-items: center; }
        .nav-menu { flex: 1; padding: 1.5rem 0.75rem; }
        .nav-item { width: 100%; display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem 1rem; margin-bottom: 0.5rem; border-radius: 0.75rem; background: transparent; border: none; color: rgba(255,255,255,0.8); transition: all 0.2s; cursor: pointer; font-size: 0.9rem; font-weight: 500; text-align: left; text-decoration: none; }
        .nav-item:hover { background: rgba(255,255,255,0.12); color: white; transform: translateX(4px); }
        .nav-item.active { background: rgba(255,255,255,0.2); backdrop-filter: blur(4px); color: white; }
        .logo-area { display: flex; align-items: center; gap: 0.75rem; padding: 1.5rem 1rem; border-bottom: 1px solid rgba(255,255,255,0.15); }
        .logout-section { padding: 1rem 0.75rem 1.5rem 0.75rem; border-top: 1px solid rgba(255,255,255,0.15); margin-top: auto; }
        .toast-msg { position: fixed; bottom: 2rem; right: 2rem; background: #1e293b; color: white; padding: 0.6rem 1.5rem; border-radius: 2rem; font-size: 0.8rem; font-weight: 500; z-index: 999; opacity: 0; transform: translateY(10px); transition: 0.2s; pointer-events: none; }
        .toast-msg.show { opacity: 1; transform: translateY(0); }
        .btn-primary { transition: all 0.2s ease; }
        .btn-primary:hover { transform: scale(1.02); box-shadow: 0 4px 12px rgba(6,182,212,0.3); }
        .action-btn { transition: all 0.2s ease; cursor: pointer; background: none; border: none; padding: 4px; }
        .action-btn:hover { transform: scale(1.1); }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); z-index: 1000; justify-content: center; align-items: center; }
        .modal.active { display: flex; }
        .modal-content { background: white; border-radius: 24px; max-width: 500px; width: 90%; animation: modalFadeIn 0.3s ease; }
        @keyframes modalFadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        @media (max-width: 768px) { .sidebar { transform: translateX(-100%); } .sidebar.open { transform: translateX(0); } .main-content { margin-left: 0; } .menu-toggle { display: flex; } .search-wrapper { display: none; } .page-title { font-size: 1.2rem; } }
    </style>
</head>
<body>
<div class="app-wrapper">
    <aside class="sidebar" id="sidebar">
        <div class="logo-area">
            <div style="background: rgba(255,255,255,0.2); width: 36px; height: 36px; border-radius: 0.75rem; display: flex; align-items: center; justify-content: center;">
                <i data-lucide="git-branch" style="color:white;" width="20" height="20"></i>
            </div>
            <h1 class="logo-text" style="color:white; font-weight:700; font-size:1.3rem;">Procevia</h1>
        </div>
       <nav class="nav-menu">
    <a href="/dashboard" class="nav-item"><i data-lucide="layout-dashboard"></i><span>Dashboard</span></a>
    <a href="/tasks" class="nav-item"><i data-lucide="check-square"></i><span>Tasks</span></a>
    <a href="/workflow" class="nav-item"><i data-lucide="git-branch"></i><span>Workflow</span></a>
    <a href="/users" class="nav-item"><i data-lucide="users"></i><span>Users</span></a>
    <a href="/roles" class="nav-item"><i data-lucide="shield"></i><span>Roles</span></a>
    <a href="/reports" class="nav-item"><i data-lucide="bar-chart-3"></i><span>Reports</span></a>
    <a href="/settings" class="nav-item"><i data-lucide="settings"></i><span>Settings</span></a>
</nav>
        <div class="logout-section">
            <a href="/logout" class="nav-item"><i data-lucide="log-out"></i><span>Logout</span></a>
        </div>
    </aside>

    <div class="main-content">
        <div class="topbar">
            <button class="menu-toggle" id="menuToggle"><i data-lucide="menu" width="20" height="20" style="color:#0891B2;"></i></button>
            <h2 class="page-title">User Management</h2>
            <div class="right-section">
                <div class="search-wrapper">
                    <i data-lucide="search" class="search-icon" width="18" height="18"></i>
                    <input type="text" id="globalSearch" placeholder="Search users...">
                </div>
                <button class="notif-btn" id="notifBtn"><i data-lucide="bell" width="20" height="20" style="color:#0891B2;"></i><span class="notif-dot"></span></button>
                <div class="avatar" id="avatarBtn">JD</div>
            </div>
        </div>

        <div class="max-w-7xl mx-auto px-4 py-8 w-full">
            <div class="flex items-center justify-between mb-8">
                <div class="bg-gradient-to-br from-cyan-500/10 to-cyan-500/5 backdrop-blur-sm rounded-2xl border border-white/50 px-6 py-4 shadow-lg">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-cyan-400 to-cyan-600 flex items-center justify-center shadow-lg">
                            <i data-lucide="users" width="24" height="24" style="color:white;"></i>
                        </div>
                        <div>
                            <div class="text-gray-500 text-sm">Total Users</div>
                            <div class="text-3xl font-extrabold text-cyan-600" id="totalUsers">0</div>
                        </div>
                    </div>
                </div>
                <button id="addUserBtn" class="btn-primary bg-gradient-to-r from-cyan-500 to-cyan-600 text-white px-6 py-3 rounded-xl font-semibold shadow-lg flex items-center gap-2" style="display: none;">
                    <i data-lucide="plus" width="20" height="20"></i> Add User
                </button>
            </div>

            <div class="bg-white/80 backdrop-blur-md rounded-2xl border border-gray-200 shadow-lg overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full">
                        <thead>
                            <tr class="border-b border-gray-200 bg-gradient-to-r from-gray-50 to-white">
                                <th class="text-left p-4 text-gray-600 font-semibold text-sm">Name</th>
                                <th class="text-left p-4 text-gray-600 font-semibold text-sm">Email</th>
                                <th class="text-left p-4 text-gray-600 font-semibold text-sm">Role</th>
                                <th class="text-left p-4 text-gray-600 font-semibold text-sm">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="usersTableBody">
                            <tr><td colspan="4" class="p-8 text-center text-gray-500">Loading users...</td</tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="userModal" class="modal">
    <div class="modal-content p-6">
        <div class="flex justify-between items-center mb-4">
            <h3 id="modalTitle" class="text-xl font-bold text-gray-800">Add User</h3>
            <button id="closeModal" class="text-gray-400 hover:text-gray-600"><i data-lucide="x" width="24" height="24"></i></button>
        </div>
        <form id="userForm">
            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-medium mb-2">Full Name *</label>
                <input type="text" id="userName" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-cyan-500" required>
            </div>
            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-medium mb-2">Email *</label>
                <input type="email" id="userEmail" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-cyan-500" required>
            </div>
            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-medium mb-2">Role</label>
                <select id="userRole" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-cyan-500">
                    <option value="user">Team Member</option>
                    <option value="manager">Manager</option>
                    <option value="admin">Admin</option>
                    <option value="observer">Observer</option>
                </select>
            </div>
            <div class="flex gap-3">
                <button type="submit" class="flex-1 bg-gradient-to-r from-cyan-500 to-cyan-600 text-white py-2 rounded-lg font-semibold">Save</button>
                <button type="button" id="cancelModal" class="flex-1 bg-gray-200 text-gray-700 py-2 rounded-lg font-semibold hover:bg-gray-300">Cancel</button>
            </div>
        </form>
    </div>
</div>

<div id="toastMsg" class="toast-msg"></div>

<script>
lucide.createIcons();

let currentEditId = null;
let allUsers = [];
let currentUserRole = null;
let isAdmin = false;

// Маппинг ролей для отображения
const roleDisplayMap = {
    'admin': 'Admin',
    'manager': 'Manager',
    'user': 'Team Member',
    'observer': 'Observer'
};

// Цвета для разных ролей
const roleColorMap = {
    'admin': 'text-purple-600 bg-purple-100',
    'manager': 'text-blue-600 bg-blue-100',
    'user': 'text-green-600 bg-green-100',
    'observer': 'text-amber-600 bg-amber-100'
};

function showToast(msg, isError = false) {
    const toast = document.getElementById('toastMsg');
    toast.innerText = msg;
    toast.classList.add('show');
    toast.style.background = isError ? '#DC2626' : '#1e293b';
    setTimeout(() => {
        toast.classList.remove('show');
        toast.style.background = '#1e293b';
    }, 2000);
}

const sidebar = document.getElementById('sidebar');
const menuToggle = document.getElementById('menuToggle');
if (menuToggle) {
    menuToggle.addEventListener('click', () => sidebar.classList.toggle('open'));
}

const notifBtn = document.getElementById('notifBtn');
if (notifBtn) {
    notifBtn.addEventListener('click', () => showToast('🔔 No new notifications'));
}

async function fetchAPI(endpoint, options = {}) {
    const response = await fetch(endpoint, {
        headers: { 'Content-Type': 'application/json' },
        ...options
    });
    if (!response.ok) {
        const error = await response.json().catch(() => ({ error: 'Request failed' }));
        throw new Error(error.error || 'Request failed');
    }
    return response.json();
}

async function loadUsers() {
    try {
        const userInfo = await fetchAPI('/api/dashboard/user-info');
        currentUserRole = userInfo.role;
        isAdmin = currentUserRole === 'admin';
        
        const avatarBtn = document.getElementById('avatarBtn');
        if (avatarBtn) avatarBtn.textContent = userInfo.avatar_initials;
        
        const addUserBtn = document.getElementById('addUserBtn');
        if (addUserBtn) {
            addUserBtn.style.display = isAdmin ? 'flex' : 'none';
        }
        
        const users = await fetchAPI('/api/users');
        allUsers = users;
        renderUsers(users);
        document.getElementById('totalUsers').textContent = users.length;
        
    } catch (error) {
        console.error('Error:', error);
        showToast(error.message, true);
        document.getElementById('usersTableBody').innerHTML = '<table><td colspan="4" class="p-8 text-center text-red-500">Error loading users</td>' + '</tr>';
    }
}

function renderUsers(users) {
    const searchTerm = document.getElementById('globalSearch')?.value.toLowerCase() || '';
    const filteredUsers = users.filter(user => 
        user.name.toLowerCase().includes(searchTerm) || 
        user.email.toLowerCase().includes(searchTerm)
    );
    
    const tbody = document.getElementById('usersTableBody');
    
    if (filteredUsers.length === 0) {
        tbody.innerHTML = '<tr><td colspan="4" class="p-8 text-center text-gray-500">No users found</td>' + '</tr>';
        return;
    }
    
    // Только админ может редактировать пользователей
    const canEdit = isAdmin;
    
    tbody.innerHTML = filteredUsers.map(user => {
        const roleDisplay = roleDisplayMap[user.role] || user.role.charAt(0).toUpperCase() + user.role.slice(1);
        const roleColor = roleColorMap[user.role] || 'text-gray-600 bg-gray-100';
        
        let actionsHtml = '';
        if (canEdit) {
            actionsHtml = `
                <div class="flex items-center gap-2">
                    <button class="action-btn text-blue-500 hover:text-blue-700" onclick="editUser(${user.id})" title="Edit">
                        <i data-lucide="edit-2" width="18" height="18"></i>
                    </button>
                    <button class="action-btn text-red-500 hover:text-red-700" onclick="deleteUser(${user.id})" title="Delete">
                        <i data-lucide="trash-2" width="18" height="18"></i>
                    </button>
                </div>
            `;
        } else {
            actionsHtml = '<span class="text-gray-400 text-xs">Read only</span>';
        }
        
        return `
            <tr class="border-b border-gray-100 hover:bg-gradient-to-r hover:from-cyan-50/50 hover:to-transparent">
                <td class="p-4">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-full bg-gradient-to-r from-cyan-400 to-cyan-600 flex items-center justify-center text-white text-sm font-bold shadow-sm">
                            ${user.initials}
                        </div>
                        <span class="font-medium text-gray-800">${escapeHtml(user.name)}</span>
                    </div>
                 </div>
                <td class="p-4 text-gray-600">${escapeHtml(user.email)}</td>
                <td class="p-4">
                    <span class="px-3 py-1 rounded-full text-xs font-semibold ${roleColor}">
                        ${roleDisplay}
                    </span>
                 </div>
                <td class="p-4">
                    ${actionsHtml}
                 </div>
              </tr>
        `;
    }).join('');
    lucide.createIcons();
}

function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

async function createUser(userData) {
    try {
        await fetchAPI('/api/users', { method: 'POST', body: JSON.stringify(userData) });
        showToast('✅ User created successfully');
        loadUsers();
        closeModal();
    } catch (error) {
        showToast(error.message, true);
    }
}

async function updateUser(userId, userData) {
    try {
        await fetchAPI(`/api/users/${userId}`, { method: 'PUT', body: JSON.stringify(userData) });
        showToast('✅ User updated successfully');
        loadUsers();
        closeModal();
    } catch (error) {
        showToast(error.message, true);
    }
}

window.deleteUser = async function(userId) {
    if (!isAdmin) {
        showToast('Access denied. Admin only.', true);
        return;
    }
    if (confirm('Are you sure you want to delete this user?')) {
        try {
            await fetchAPI(`/api/users/${userId}`, { method: 'DELETE' });
            showToast('🗑️ User deleted');
            loadUsers();
        } catch (error) {
            showToast(error.message, true);
        }
    }
};

window.editUser = async function(userId) {
    if (!isAdmin) {
        showToast('Access denied. Admin only.', true);
        return;
    }
    try {
        const user = allUsers.find(u => u.id === userId);
        if (user) {
            currentEditId = userId;
            document.getElementById('modalTitle').textContent = 'Edit User';
            document.getElementById('userName').value = user.name;
            document.getElementById('userEmail').value = user.email;
            const roleSelect = document.getElementById('userRole');
            roleSelect.value = user.role;
            document.getElementById('userModal').classList.add('active');
            lucide.createIcons();
        }
    } catch (error) {
        showToast('Error loading user', true);
    }
};

function saveUser() {
    if (!isAdmin) {
        showToast('Access denied. Admin only.', true);
        return;
    }
    
    const name = document.getElementById('userName').value;
    const email = document.getElementById('userEmail').value;
    const role = document.getElementById('userRole').value;
    
    if (!name || !email) {
        showToast('Please fill in required fields', true);
        return;
    }
    
    const userData = { name, email, role };
    
    if (currentEditId) {
        updateUser(currentEditId, userData);
    } else {
        createUser(userData);
    }
}

function openModal() {
    if (!isAdmin) {
        showToast('Access denied. Admin only.', true);
        return;
    }
    currentEditId = null;
    document.getElementById('modalTitle').textContent = 'Add User';
    document.getElementById('userForm').reset();
    document.getElementById('userModal').classList.add('active');
    lucide.createIcons();
}

function closeModal() {
    document.getElementById('userModal').classList.remove('active');
    currentEditId = null;
}

document.getElementById('addUserBtn').onclick = openModal;
document.getElementById('closeModal').onclick = closeModal;
document.getElementById('cancelModal').onclick = closeModal;
document.getElementById('userForm').onsubmit = (e) => { e.preventDefault(); saveUser(); };
document.getElementById('globalSearch').oninput = () => renderUsers(allUsers);

loadUsers();
</script>
</body>
</html>
