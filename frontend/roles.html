<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Procevia - Roles Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(145deg, #f1f5f9 0%, #eef2f8 100%); min-height: 100vh; }
        .app-wrapper { display: flex; min-height: 100vh; }
        .sidebar { position: fixed; left: 0; top: 0; height: 100%; width: 260px; background: linear-gradient(135deg, #0891B2, #06B6D4); display: flex; flex-direction: column; z-index: 30; transition: transform 0.3s ease; }
        .main-content { flex: 1; margin-left: 260px; display: flex; flex-direction: column; }
        .topbar { height: 64px; background: rgba(255,255,255,0.85); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(203,213,225,0.6); padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 20; }
        .page-title { font-size: 1.75rem; font-weight: 700; color: #111827; }
        .menu-toggle { display: none; width: 40px; height: 40px; background: rgba(6,182,212,0.1); border-radius: 0.75rem; align-items: center; justify-content: center; cursor: pointer; border: none; }
        .search-wrapper { position: relative; width: 280px; }
        .search-wrapper input { width: 100%; height: 40px; padding-left: 2.5rem; padding-right: 1rem; background: linear-gradient(135deg, #ECFEFF, white); border: 1px solid rgba(6,182,212,0.25); border-radius: 0.75rem; font-size: 0.85rem; outline: none; }
        .search-icon { position: absolute; left: 0.75rem; top: 50%; transform: translateY(-50%); color: #06B6D4; }
        .notif-btn { width: 40px; height: 40px; background: linear-gradient(145deg, rgba(34,211,238,0.1), rgba(6,182,212,0.1)); border-radius: 0.75rem; display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; border: none; }
        .notif-dot { position: absolute; top: 8px; right: 8px; width: 8px; height: 8px; background: #EF4444; border-radius: 50%; border: 2px solid white; }
        .avatar { width: 40px; height: 40px; background: linear-gradient(135deg, #22D3EE, #06B6D4); border-radius: 0.75rem; display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; cursor: pointer; }
        .right-section { display: flex; gap: 1rem; align-items: center; }
        .nav-menu { flex: 1; padding: 1.5rem 0.75rem; }
        .nav-item { width: 100%; display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem 1rem; margin-bottom: 0.5rem; border-radius: 0.75rem; background: transparent; border: none; color: rgba(255,255,255,0.8); transition: all 0.2s; cursor: pointer; font-size: 0.9rem; font-weight: 500; text-align: left; text-decoration: none; }
        .nav-item:hover { background: rgba(255,255,255,0.12); color: white; transform: translateX(4px); }
        .nav-item.active { background: rgba(255,255,255,0.2); backdrop-filter: blur(4px); color: white; }
        .logo-area { display: flex; align-items: center; gap: 0.75rem; padding: 1.5rem 1rem; border-bottom: 1px solid rgba(255,255,255,0.15); }
        .logout-section { padding: 1rem 0.75rem 1.5rem 0.75rem; border-top: 1px solid rgba(255,255,255,0.15); margin-top: auto; }
        .toast-msg { position: fixed; bottom: 2rem; right: 2rem; background: #1e293b; color: white; padding: 0.6rem 1.5rem; border-radius: 2rem; font-size: 0.8rem; font-weight: 500; z-index: 999; opacity: 0; transform: translateY(10px); transition: 0.2s; pointer-events: none; }
        .toast-msg.show { opacity: 1; transform: translateY(0); }
        .roles-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.5rem; padding: 1.5rem; }
        .role-card { background: rgba(255,255,255,0.85); backdrop-filter: blur(12px); border-radius: 1.25rem; border: 2px solid rgba(226,232,240,0.8); transition: all 0.25s ease; overflow: hidden; }
        .role-card:hover { transform: scale(1.02); box-shadow: 0 20px 30px -12px rgba(0,0,0,0.12); }
        .edit-role-btn { background: rgba(255,255,255,0.7); border: 2px solid white; border-radius: 0.75rem; padding: 0.35rem 1rem; display: flex; align-items: center; gap: 0.5rem; font-weight: 600; font-size: 0.8rem; cursor: pointer; transition: 0.2s; }
        .edit-role-btn:hover { background: white; transform: translateY(-1px); }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); z-index: 1000; justify-content: center; align-items: center; }
        .modal.active { display: flex; }
        .modal-content { background: white; border-radius: 24px; max-width: 600px; width: 90%; max-height: 80vh; overflow-y: auto; animation: modalFadeIn 0.3s ease; }
        @keyframes modalFadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        @media (max-width: 768px) { .sidebar { transform: translateX(-100%); } .sidebar.open { transform: translateX(0); } .main-content { margin-left: 0; } .menu-toggle { display: flex; } .search-wrapper { display: none; } .roles-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<div class="app-wrapper">
    <aside class="sidebar" id="sidebar">
        <div class="logo-area">
            <div style="background: rgba(255,255,255,0.2); width: 36px; height: 36px; border-radius: 0.75rem; display: flex; align-items: center; justify-content: center;">
                <i data-lucide="git-branch" style="color:white;" width="20" height="20"></i>
            </div>
            <h1 class="logo-text" style="color:white; font-weight:700; font-size:1.3rem;">Procevia</h1>
        </div>
        <nav class="nav-menu">
            <a href="/dashboard" class="nav-item"><i data-lucide="layout-dashboard"></i><span>Dashboard</span></a>
            <a href="/tasks" class="nav-item"><i data-lucide="check-square"></i><span>Tasks</span></a>
            <a href="/workflow" class="nav-item"><i data-lucide="git-branch"></i><span>Workflow</span></a>
            <a href="/users" class="nav-item"><i data-lucide="users"></i><span>Users</span></a>
            <a href="/roles" class="nav-item active"><i data-lucide="shield"></i><span>Roles</span></a>
            <a href="/reports" class="nav-item"><i data-lucide="bar-chart-3"></i><span>Reports</span></a>
            <a href="/settings" class="nav-item"><i data-lucide="settings"></i><span>Settings</span></a>
        </nav>
        <div class="logout-section">
            <a href="/logout" class="nav-item"><i data-lucide="log-out"></i><span>Logout</span></a>
        </div>
    </aside>

    <div class="main-content">
        <div class="topbar">
            <button class="menu-toggle" id="menuToggle"><i data-lucide="menu" width="20" height="20" style="color:#0891B2;"></i></button>
            <h2 class="page-title">Roles Management</h2>
            <div class="right-section">
                <div class="search-wrapper">
                    <i data-lucide="search" class="search-icon" width="18" height="18"></i>
                    <input type="text" id="globalSearch" placeholder="Search roles...">
                </div>
                <button class="notif-btn" id="notifBtn"><i data-lucide="bell" width="20" height="20" style="color:#0891B2;"></i><span class="notif-dot"></span></button>
                <div class="avatar" id="avatarBtn">JD</div>
            </div>
        </div>

        <div class="roles-grid" id="rolesGrid"></div>
    </div>
</div>

<div id="roleModal" class="modal">
    <div class="modal-content p-6">
        <div class="flex justify-between items-center mb-4">
            <h3 id="modalTitle" class="text-xl font-bold text-gray-800">Edit Role</h3>
            <button id="closeModal" class="text-gray-400 hover:text-gray-600"><i data-lucide="x" width="24" height="24"></i></button>
        </div>
        <form id="roleForm">
            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-medium mb-2">Role Name</label>
                <input type="text" id="roleName" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-cyan-500" required>
            </div>
            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-medium mb-2">Description</label>
                <textarea id="roleDescription" rows="2" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-cyan-500"></textarea>
            </div>
            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-medium mb-2">Color</label>
                <input type="color" id="roleColor" class="w-full h-10 px-3 py-1 border border-gray-300 rounded-lg">
            </div>
            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-medium mb-2">Icon</label>
                <select id="roleIcon" class="w-full px-3 py-2 border border-gray-300 rounded-lg">
                    <option value="shield">Shield</option>
                    <option value="users">Users</option>
                    <option value="eye">Eye</option>
                    <option value="settings">Settings</option>
                </select>
            </div>
            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-medium mb-2">Permissions</label>
                <div id="permissionsList" class="space-y-2"></div>
            </div>
            <div class="flex gap-3">
                <button type="button" id="addPermissionBtn" class="bg-gray-200 text-gray-700 py-2 px-4 rounded-lg font-semibold hover:bg-gray-300">+ Add Permission</button>
            </div>
            <div class="flex gap-3 mt-4">
                <button type="submit" class="flex-1 bg-gradient-to-r from-cyan-500 to-cyan-600 text-white py-2 rounded-lg font-semibold">Save Changes</button>
                <button type="button" id="cancelModal" class="flex-1 bg-gray-200 text-gray-700 py-2 rounded-lg font-semibold hover:bg-gray-300">Cancel</button>
            </div>
        </form>
    </div>
</div>

<div id="toastMsg" class="toast-msg"></div>

<script>
lucide.createIcons();

// Мобильное меню
const sidebar = document.getElementById('sidebar');
const menuToggle = document.getElementById('menuToggle');
if (menuToggle) {
    menuToggle.addEventListener('click', () => sidebar.classList.toggle('open'));
}

let currentRoleId = null;
let allRoles = [];
let isAdmin = false;

function showToast(msg, isError = false) {
    const toast = document.getElementById('toastMsg');
    toast.innerText = msg;
    toast.classList.add('show');
    toast.style.background = isError ? '#DC2626' : '#1e293b';
    setTimeout(() => {
        toast.classList.remove('show');
        toast.style.background = '#1e293b';
    }, 2000);
}

async function fetchAPI(endpoint, options = {}) {
    const response = await fetch(endpoint, {
        headers: { 'Content-Type': 'application/json' },
        ...options
    });
    if (!response.ok) {
        const error = await response.json().catch(() => ({ error: 'Request failed' }));
        throw new Error(error.error || 'Request failed');
    }
    return response.json();
}

async function loadUserInfo() {
    try {
        const userInfo = await fetchAPI('/api/dashboard/user-info');
        isAdmin = userInfo.role === 'admin';
        const avatarBtn = document.getElementById('avatarBtn');
        if (avatarBtn) avatarBtn.textContent = userInfo.avatar_initials;
    } catch (error) {
        console.error('Error loading user info:', error);
    }
}

async function loadRoles() {
    try {
        const roles = await fetchAPI('/api/roles');
        allRoles = roles;
        renderRoles(roles);
    } catch (error) {
        console.error('Error loading roles:', error);
        showToast('Error loading roles', true);
    }
}

function renderRoles(roles) {
    const searchTerm = document.getElementById('globalSearch')?.value.toLowerCase() || '';
    const filteredRoles = roles.filter(role => 
        role.name.toLowerCase().includes(searchTerm) || 
        role.description.toLowerCase().includes(searchTerm)
    );
    
    const grid = document.getElementById('rolesGrid');
    
    if (filteredRoles.length === 0) {
        grid.innerHTML = '<div class="col-span-full text-center p-8 text-gray-500">No roles found</div>';
        return;
    }
    
    const roleDisplayMap = {
        'admin': 'Admin',
        'manager': 'Manager',
        'user': 'Team Member',
        'observer': 'Observer'
    };
    
    grid.innerHTML = filteredRoles.map(role => {
        const displayName = roleDisplayMap[role.name] || role.name.charAt(0).toUpperCase() + role.name.slice(1);
        return `
            <div class="role-card">
                <div class="p-6" style="background: linear-gradient(135deg, ${role.color}10, ${role.color}05)">
                    <div class="flex justify-between items-start mb-4">
                        <div class="flex items-center gap-3">
                            <div class="w-12 h-12 rounded-xl flex items-center justify-center shadow-lg" style="background: linear-gradient(135deg, ${role.color}, ${role.color}dd)">
                                <i data-lucide="${role.icon_name}" width="24" height="24" style="color:white;"></i>
                            </div>
                            <div>
                                <h3 class="text-xl font-bold" style="color: ${role.color}">${escapeHtml(displayName)}</h3>
                                <p class="text-gray-500 text-sm">${escapeHtml(role.description)}</p>
                            </div>
                        </div>
                        ${isAdmin ? `
                            <button class="edit-role-btn" onclick="editRole(${role.id})" style="color: ${role.color}">
                                <i data-lucide="edit" width="14" height="14"></i> Edit
                            </button>
                        ` : ''}
                    </div>
                    <div class="mt-4">
                        <div class="flex justify-between items-center mb-3">
                            <span class="text-sm font-semibold text-gray-600">👥 Users: ${role.user_count}</span>
                            ${!isAdmin ? '<span class="text-xs text-gray-400">🔒 Read only</span>' : ''}
                        </div>
                        <div class="space-y-2">
                            ${role.permissions.map(perm => `
                                <div class="flex items-center gap-2">
                                    <i data-lucide="check" width="14" height="14" style="color: ${role.color}"></i>
                                    <span class="text-sm text-gray-700">${escapeHtml(perm)}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            </div>
        `;
    }).join('');
    lucide.createIcons();
}

function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function addPermissionField(value = '') {
    const container = document.getElementById('permissionsList');
    const div = document.createElement('div');
    div.className = 'flex items-center gap-2 mb-2';
    div.innerHTML = `
        <input type="text" class="permission-input flex-1 px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-cyan-500" value="${escapeHtml(value)}" placeholder="Permission name">
        <button type="button" class="remove-permission text-red-500 hover:text-red-700" onclick="this.parentElement.remove()">
            <i data-lucide="x" width="18" height="18"></i>
        </button>
    `;
    container.appendChild(div);
    lucide.createIcons();
}

window.editRole = async function(roleId) {
    if (!isAdmin) return;
    try {
        const role = allRoles.find(r => r.id === roleId);
        if (role) {
            currentRoleId = roleId;
            document.getElementById('modalTitle').textContent = 'Edit Role';
            document.getElementById('roleName').value = role.name;
            document.getElementById('roleDescription').value = role.description;
            document.getElementById('roleColor').value = role.color;
            document.getElementById('roleIcon').value = role.icon_name;
            
            const permissionsContainer = document.getElementById('permissionsList');
            permissionsContainer.innerHTML = '';
            role.permissions.forEach(perm => addPermissionField(perm));
            
            document.getElementById('roleModal').classList.add('active');
            lucide.createIcons();
        }
    } catch (error) {
        showToast('Error loading role', true);
    }
};

async function saveRole() {
    const name = document.getElementById('roleName').value;
    const description = document.getElementById('roleDescription').value;
    const color = document.getElementById('roleColor').value;
    const icon_name = document.getElementById('roleIcon').value;
    
    const permissionInputs = document.querySelectorAll('.permission-input');
    const permissions = Array.from(permissionInputs).map(input => input.value).filter(p => p.trim());
    
    if (!name) {
        showToast('Role name is required', true);
        return;
    }
    
    const roleData = { name, description, color, icon_name, permissions };
    
    try {
        await fetchAPI(`/api/roles/${currentRoleId}`, {
            method: 'PUT',
            body: JSON.stringify(roleData)
        });
        showToast('✅ Role updated successfully');
        loadRoles();
        closeModal();
    } catch (error) {
        showToast(error.message, true);
    }
}

function closeModal() {
    document.getElementById('roleModal').classList.remove('active');
    currentRoleId = null;
}

document.getElementById('addPermissionBtn')?.addEventListener('click', () => addPermissionField(''));
document.getElementById('closeModal')?.addEventListener('click', closeModal);
document.getElementById('cancelModal')?.addEventListener('click', closeModal);
document.getElementById('roleForm')?.addEventListener('submit', (e) => {
    e.preventDefault();
    saveRole();
});

document.getElementById('globalSearch')?.addEventListener('input', () => renderRoles(allRoles));

async function init() {
    await loadUserInfo();
    await loadRoles();
}

init();
</script>
</body>
</html>
