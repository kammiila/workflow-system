<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Procevia — Панель управления ролями</title>
    <!-- Google Fonts Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
            background: linear-gradient(145deg, #f1f5f9 0%, #eef2f8 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Layout */
        .app-wrapper {
            display: flex;
            min-height: 100vh;
        }

        /* SIDEBAR (фиксированная) */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            height: 100%;
            width: 260px;
            background: linear-gradient(135deg, #0891B2, #06B6D4);
            display: flex;
            flex-direction: column;
            z-index: 30;
            box-shadow: 4px 0 20px rgba(0, 0, 0, 0.08);
        }

        /* MAIN CONTENT (отступ под сайдбар) */
        .main-content {
            flex: 1;
            margin-left: 260px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* TopBar */
        .topbar {
            height: 64px;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(203, 213, 225, 0.6);
            padding: 0 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 20;
        }

        .page-title {
            font-size: 1.75rem;
            font-weight: 700;
            color: #111827;
            letter-spacing: -0.02em;
        }

        .search-wrapper {
            position: relative;
            width: 300px;
        }
        .search-wrapper input {
            width: 100%;
            height: 40px;
            padding-left: 2.5rem;
            padding-right: 1rem;
            background: linear-gradient(135deg, #ECFEFF, white);
            border: 1px solid rgba(6, 182, 212, 0.25);
            border-radius: 0.75rem;
            font-size: 0.85rem;
            outline: none;
            transition: all 0.2s;
        }
        .search-wrapper input:focus {
            border-color: #22D3EE;
            ring: 2px solid #22D3EE;
            box-shadow: 0 0 0 2px rgba(34, 211, 238, 0.3);
        }
        .search-icon {
            position: absolute;
            left: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            color: #06B6D4;
        }
        .notif-btn {
            width: 40px;
            height: 40px;
            background: linear-gradient(145deg, rgba(34, 211, 238, 0.1), rgba(6, 182, 212, 0.1));
            border-radius: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            cursor: pointer;
            position: relative;
        }
        .notif-btn:hover {
            background: linear-gradient(145deg, rgba(34, 211, 238, 0.2), rgba(6, 182, 212, 0.2));
        }
        .notif-dot {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 8px;
            height: 8px;
            background: #EF4444;
            border-radius: 50%;
            border: 2px solid white;
        }
        .avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #22D3EE, #06B6D4);
            border-radius: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            box-shadow: 0 6px 12px -6px rgba(6, 182, 212, 0.4);
        }

        /* Page container (роли) */
        .roles-page-container {
            padding: 1.75rem 2rem 2rem 2rem;
        }

        /* Grid для карточек ролей */
        .roles-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
        }

        /* карточка роли */
        .role-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 1.25rem;
            border: 2px solid rgba(226, 232, 240, 0.8);
            transition: all 0.25s ease;
            overflow: hidden;
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.02);
        }
        .role-card:hover {
            transform: scale(1.02);
            box-shadow: 0 20px 30px -12px rgba(0, 0, 0, 0.12);
            border-color: #cbd5e1;
        }

        .role-header {
            padding: 1.5rem;
            border-bottom: 2px solid rgba(255,255,240,0.5);
        }
        .role-title-area {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
        }
        .role-icon-group {
            display: flex;
            gap: 0.75rem;
            align-items: center;
        }
        .icon-badge {
            width: 48px;
            height: 48px;
            border-radius: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 12px -6px rgba(0,0,0,0.1);
        }
        .role-name {
            font-size: 1.65rem;
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 0.2rem;
        }
        .role-desc {
            font-size: 0.75rem;
            color: #4b5563;
        }
        .stats-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 0.5rem;
        }
        .users-badge {
            background: rgba(255,255,255,0.6);
            backdrop-filter: blur(4px);
            padding: 0.3rem 0.9rem;
            border-radius: 0.65rem;
            border: 1px solid white;
            font-size: 0.8rem;
            font-weight: 500;
        }
        .edit-role-btn {
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(4px);
            border: 2px solid white;
            border-radius: 0.75rem;
            padding: 0.35rem 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 600;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .edit-role-btn:hover {
            background: white;
            transform: translateY(-1px);
        }
        .permissions-section {
            padding: 1.5rem;
        }
        .perm-title {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 700;
            margin-bottom: 1.2rem;
            color: #111827;
        }
        .perm-item {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 0.85rem;
            align-items: flex-start;
        }
        .check-circle {
            width: 24px;
            height: 24px;
            background: linear-gradient(135deg, rgba(6,182,212,0.2), rgba(34,211,238,0.1));
            border-radius: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .perm-text {
            font-size: 0.85rem;
            color: #1f2937;
            line-height: 1.4;
        }

        @media (max-width: 900px) {
            .sidebar {
                width: 72px;
            }
            .sidebar .logo-text, .sidebar .menu-label {
                display: none;
            }
            .main-content {
                margin-left: 72px;
            }
            .roles-grid {
                grid-template-columns: 1fr;
            }
            .search-wrapper {
                width: 200px;
            }
        }

        /* меню навигации */
        .nav-menu {
            flex: 1;
            padding: 1.5rem 0.75rem;
        }
        .nav-item {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.7rem 1rem;
            margin-bottom: 0.5rem;
            border-radius: 0.75rem;
            background: transparent;
            border: none;
            color: rgba(255,255,255,0.75);
            transition: all 0.2s;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
        }
        .nav-item.active {
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(4px);
            color: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .nav-item:hover:not(.active) {
            background: rgba(255,255,255,0.1);
            color: white;
        }
        .logout-btn {
            margin: 0 0.75rem 1.5rem 0.75rem;
            border-top: 1px solid rgba(255,255,255,0.2);
            padding-top: 1rem;
        }
        .toast-msg {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: #1e293b;
            color: white;
            padding: 0.6rem 1.5rem;
            border-radius: 2rem;
            font-size: 0.8rem;
            font-weight: 500;
            z-index: 999;
            opacity: 0;
            transform: translateY(10px);
            transition: 0.2s;
            pointer-events: none;
        }
        .toast-msg.show {
            opacity: 1;
            transform: translateY(0);
        }
        .logo-area {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            padding: 1.25rem 1rem;
        }
    </style>
</head>
<body>
<div class="app-wrapper">
    <!-- Sidebar (фикс) -->
    <aside class="sidebar" id="sidebar">
        <div class="logo-area">
            <div class="icon-badge" style="background: rgba(255,255,255,0.2); width: 36px; height: 36px;">
                <i data-lucide="git-branch" style="color:white;" width="20" height="20"></i>
            </div>
            <h1 class="logo-text" style="color:white; font-weight:700; font-size:1.3rem;">Procevia</h1>
        </div>
<!-- Найди этот блок в HTML (примерно строки 50-80) -->
<nav class="nav-menu" id="navMenu">
    <!-- ЗАМЕНИ ВСЕ ЧТО ВНУТРИ на эти ссылки -->
    <a href="dashboard.html" class="nav-item">
        <i data-lucide="layout-dashboard"></i>

                <span class="menu-label">Logout</span>

    <!-- Main area -->
    <div class="main-content">
        <div class="topbar">
            <h2 class="page-title" id="pageTitle">Roles</h2>
            <div style="display: flex; gap: 1rem; align-items: center;">
                <div class="search-wrapper">
                    <i data-lucide="search" class="search-icon" width="18" height="18"></i>
                    <input type="text" id="globalSearch" placeholder="Search...">
                </div>
                <div class="notif-btn" id="notifBtn">

            <!-- Динамически будут рендериться карточки ролей -->

</div>
<div id="toastMsg" class="toast-msg">✨ Готово</div>

<script>
    // ---------- Данные ролей ----------
    const rolesData = [
        { name: 'Admin', color: '#EF4444', bgGradient: 'from-[#FEF2F2] via-[#FEE2E2] to-[#FEF2F2]', iconName: 'Shield', description: 'Full system access and management', permissions: ['Manage all workflows','Create and delete users','Assign roles and permissions','Access all reports','System configuration','Backup and restore'], userCount: 2 },
        { name: 'Manager', color: '#06B6D4', bgGradient: 'from-[#ECFEFF] via-[#CFFAFE] to-[#ECFEFF]', iconName: 'Users', description: 'Team and project management', permissions: ['Create and manage workflows','Assign tasks to team','View team reports','Approve workflow stages','Manage team schedules'], userCount: 5 },
        { name: 'Team Member', color: '#22C55E', bgGradient: 'from-[#F0FDF4] via-[#DCFCE7] to-[#F0FDF4]', iconName: 'Users', description: 'Task execution and updates', permissions: ['View assigned tasks','Update task status','Add comments','Upload attachments','View team calendar'], userCount: 18 },
        { name: 'Observer', color: '#6B7280', bgGradient: 'from-[#F9FAFB] via-[#F3F4F6] to-[#F9FAFB]', iconName: 'Shield', description: 'Read-only access', permissions: ['View workflows','View reports','Export data'], userCount: 3 }
    ];

    // Меню пункты
    const menuItems = [
        { id: 'dashboard', label: 'Dashboard', icon: 'layout-dashboard' },
        { id: 'tasks', label: 'Tasks', icon: 'check-square' },
        { id: 'workflow', label: 'Workflow', icon: 'git-branch' },
        { id: 'users', label: 'Users', icon: 'users' },
        { id: 'roles', label: 'Roles', icon: 'shield' },
        { id: 'reports', label: 'Reports', icon: 'bar-chart-3' },
        { id: 'settings', label: 'Settings', icon: 'settings' }
    ];

    let currentPage = 'roles';   // активная страница
    let searchQuery = '';

    // Helper: преобразование градиента из строки в CSS
    function parseGradient(gradientStr) {
        const fromMatch = gradientStr.match(/from-\[(#?[A-Fa-f0-9]+)\]/);
        const viaMatch = gradientStr.match(/via-\[(#?[A-Fa-f0-9]+)\]/);
        const toMatch = gradientStr.match(/to-\[(#?[A-Fa-f0-9]+)\]/);
        let from = '#FEF2F2', to = '#FEF2F2', via = null;
        if (fromMatch) from = fromMatch[1];
        if (toMatch) to = toMatch[1];
        if (viaMatch) via = viaMatch[1];
        if (via) return `linear-gradient(135deg, ${from}, ${via}, ${to})`;
        return `linear-gradient(135deg, ${from}, ${to})`;
    }

    function showToast(msg) {
        const toast = document.getElementById('toastMsg');
        toast.innerText = msg || 'Действие выполнено';
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2000);
    }

    // Рендер карточек ролей
    function renderRolesPage() {
        const grid = document.getElementById('rolesGrid');
        if (!grid) return;
        grid.innerHTML = '';
        // фильтрация по поиску (по имени роли или описанию)
        let filtered = rolesData;
        if (searchQuery.trim() !== '') {
            const q = searchQuery.toLowerCase();
            filtered = rolesData.filter(r => r.name.toLowerCase().includes(q) || r.description.toLowerCase().includes(q));
        }
        if (filtered.length === 0) {
            grid.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:3rem;">🔍 Ничего не найдено</div>`;
        }
        filtered.forEach((role, idx) => {
            const card = document.createElement('div');
            card.className = 'role-card';
            const headerBg = parseGradient(role.bgGradient);
            // header
            const headerDiv = document.createElement('div');
            headerDiv.className = 'role-header';
            headerDiv.style.background = headerBg;
            // title area
            const titleArea = document.createElement('div');
            titleArea.className = 'role-title-area';
            const iconGroup = document.createElement('div');
            iconGroup.className = 'role-icon-group';
            const iconWrap = document.createElement('div');
            iconWrap.className = 'icon-badge';
            iconWrap.style.background = `linear-gradient(135deg, ${role.color}, ${role.color}dd)`;
            const iconElem = document.createElement('i');
            const iconType = role.iconName === 'Shield' ? 'shield' : 'users';
            iconElem.setAttribute('data-lucide', iconType);
            iconElem.setAttribute('width', '24');
            iconElem.setAttribute('height', '24');
            iconElem.style.color = 'white';
            iconWrap.appendChild(iconElem);
            const textBlock = document.createElement('div');
            const nameH = document.createElement('h3');
            nameH.className = 'role-name';
            nameH.style.color = role.color;
            nameH.innerText = role.name;
            const descP = document.createElement('p');
            descP.className = 'role-desc';
            descP.innerText = role.description;
            textBlock.appendChild(nameH);
            textBlock.appendChild(descP);
            iconGroup.appendChild(iconWrap);
            iconGroup.appendChild(textBlock);
            titleArea.appendChild(iconGroup);
            titleArea.appendChild(document.createElement('div'));
            // stats
            const statsBar = document.createElement('div');
            statsBar.className = 'stats-bar';
            const usersSpan = document.createElement('div');
            usersSpan.className = 'users-badge';
            usersSpan.innerHTML = `<span>Active Users: </span><span style="font-weight:800; color:${role.color};">${role.userCount}</span>`;
            const editBtn = document.createElement('button');
            editBtn.className = 'edit-role-btn';
            editBtn.style.color = role.color;
            const editIcon = document.createElement('i');
            editIcon.setAttribute('data-lucide', 'edit');
            editIcon.setAttribute('width', '14');
            editIcon.setAttribute('height', '14');
            editBtn.appendChild(editIcon);
            editBtn.appendChild(document.createTextNode(' Edit'));
            editBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                showToast(`Редактирование роли «${role.name}» (демо)`);
            });
            statsBar.appendChild(usersSpan);
            statsBar.appendChild(editBtn);
            headerDiv.appendChild(titleArea);
            headerDiv.appendChild(statsBar);
            // permissions
            const permSection = document.createElement('div');
            permSection.className = 'permissions-section';
            const permTitle = document.createElement('div');
            permTitle.className = 'perm-title';
            const titleCheck = document.createElement('i');
            titleCheck.setAttribute('data-lucide', 'check');
            titleCheck.setAttribute('width', '18');
            titleCheck.setAttribute('height', '18');
            titleCheck.style.color = '#14b8a6';
            permTitle.appendChild(titleCheck);
            permTitle.appendChild(document.createTextNode(' Permissions'));
            permSection.appendChild(permTitle);
            const permListDiv = document.createElement('div');
            role.permissions.forEach(perm => {
                const item = document.createElement('div');
                item.className = 'perm-item';
                const circle = document.createElement('div');
                circle.className = 'check-circle';
                const checkIcon = document.createElement('i');
                checkIcon.setAttribute('data-lucide', 'check');
                checkIcon.setAttribute('width', '14');
                checkIcon.setAttribute('height', '14');
                checkIcon.style.color = '#0891b2';
                circle.appendChild(checkIcon);
                const textSpan = document.createElement('span');
                textSpan.className = 'perm-text';
                textSpan.innerText = perm;
                item.appendChild(circle);
                item.appendChild(textSpan);
                permListDiv.appendChild(item);
            });
            permSection.appendChild(permListDiv);
            card.appendChild(headerDiv);
            card.appendChild(permSection);
            grid.appendChild(card);
        });
        if (typeof lucide !== 'undefined') lucide.createIcons();
    }

    function renderSidebar() {
        const navContainer = document.getElementById('navMenu');
        if (!navContainer) return;
        navContainer.innerHTML = '';
        menuItems.forEach(item => {
            const btn = document.createElement('button');
            btn.className = 'nav-item';
            if (currentPage === item.id) btn.classList.add('active');
            const icon = document.createElement('i');
            icon.setAttribute('data-lucide', item.icon);
            icon.setAttribute('width', '20');
            icon.setAttribute('height', '20');
            const span = document.createElement('span');
            span.className = 'menu-label';
            span.innerText = item.label;
            btn.appendChild(icon);
            btn.appendChild(span);
            btn.addEventListener('click', () => {
                navigateTo(item.id);
            });
            navContainer.appendChild(btn);
        });
        if (typeof lucide !== 'undefined') lucide.createIcons();
    }

    function navigateTo(pageId) {
        currentPage = pageId;
        document.getElementById('pageTitle').innerText = pageId.charAt(0).toUpperCase() + pageId.slice(1);
        // Обновляем контент в зависимости от страницы
        const contentContainer = document.getElementById('pageContent');
        if (pageId === 'roles') {
            contentContainer.innerHTML = `<div class="roles-grid" id="rolesGrid"></div>`;
            renderRolesPage();
        } else {
            // заглушки для других страниц (демо)
            contentContainer.innerHTML = `
                <div style="background: white; border-radius: 1.5rem; padding: 3rem; text-align: center; backdrop-filter: blur(8px); background: rgba(255,255,240,0.7);">
                    <i data-lucide="${menuItems.find(i=>i.id===pageId)?.icon || 'circle'}" width="48" height="48" style="color:#0891B2; margin-bottom:1rem;"></i>
                    <h2 style="font-size:1.8rem; font-weight:700;">${pageId.charAt(0).toUpperCase() + pageId.slice(1)}</h2>
                    <p style="color:#4b5563; margin-top:0.5rem;">Модуль в разработке. Здесь будет функционал ${pageId}.</p>
                    <button id="demoBackToRoles" style="margin-top:1.5rem; background:#06B6D4; border:none; padding:0.5rem 1.5rem; border-radius:2rem; color:white; font-weight:600; cursor:pointer;">Вернуться к ролям</button>
                </div>
            `;
            if (typeof lucide !== 'undefined') lucide.createIcons();
            const backBtn = document.getElementById('demoBackToRoles');
            if (backBtn) backBtn.addEventListener('click', () => navigateTo('roles'));
        }
        // обновить поисковую строку, чтобы она работала только на странице ролей
        const searchInput = document.getElementById('globalSearch');
        if (searchInput) {
            if (pageId === 'roles') {
                searchInput.disabled = false;
                searchInput.placeholder = "Поиск по ролям...";
            } else {
                searchInput.disabled = true;
                searchInput.placeholder = "Доступно только в разделе Roles";
            }
        }
    }

    function handleSearch() {
        const searchInput = document.getElementById('globalSearch');
        if (currentPage === 'roles') {
            searchQuery = searchInput.value;
            renderRolesPage();
        } else {
            // ничего не делаем
        }
    }

    // Event listeners + инициализация
    function init() {
        navigateTo('roles');  // стартовая страница Roles
        const searchInput = document.getElementById('globalSearch');
        if (searchInput) {
            searchInput.addEventListener('input', (e) => {
                if (currentPage === 'roles') {
                    searchQuery = e.target.value;
                    renderRolesPage();
                }
            });
        }
        const notif = document.getElementById('notifBtn');
        if (notif) notif.addEventListener('click', () => showToast('Уведомления: пока ничего нового'));
        // обновить иконки в динамике
        if (typeof lucide !== 'undefined') lucide.createIcons();
    }

    init();
</script>
</body>
</html>
