<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Denied - Procevia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
</head>
<body class="bg-gradient-to-br from-cyan-400 to-blue-500 min-h-screen flex items-center justify-center">
    <div class="max-w-md w-full mx-4">
        <div class="bg-white rounded-2xl shadow-2xl overflow-hidden">
            <div class="bg-gradient-to-r from-red-500 to-amber-500 p-6 text-center">
                <div class="w-20 h-20 bg-white/20 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i data-lucide="lock" class="w-10 h-10 text-white"></i>
                </div>
                <h1 class="text-2xl font-bold text-white">Access Denied</h1>
            </div>
            <div class="p-6 text-center">
                <i data-lucide="alert-circle" class="w-16 h-16 text-red-500 mx-auto mb-4"></i>
                <h2 class="text-xl font-semibold text-gray-800 mb-2">Page: {{ page }}</h2>
                <p class="text-gray-600 mb-4">
                    You don't have permission to access this page.<br>
                    Required role: <span class="font-semibold text-cyan-600">{{ required_role }}</span>
                </p>
                <div class="flex gap-3 justify-center">
                    <a href="/dashboard" class="px-4 py-2 bg-cyan-500 text-white rounded-lg hover:bg-cyan-600 transition flex items-center gap-2">
                        <i data-lucide="layout-dashboard" width="18" height="18"></i> Dashboard
                    </a>
                    <a href="/logout" class="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 transition flex items-center gap-2">
                        <i data-lucide="log-out" width="18" height="18"></i> Logout
                    </a>
                </div>
            </div>
            <div class="bg-gray-50 px-6 py-3 text-center">
                <p class="text-xs text-gray-500">Your role: <span class="font-semibold text-cyan-600">{{ user_role }}</span></p>
            </div>
        </div>
    </div>
    <script>lucide.createIcons();</script>
</body>
</html>
