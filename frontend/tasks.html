<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Procevia - Task Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
            background: linear-gradient(145deg, #f1f5f9 0%, #eef2f8 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .app-wrapper {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            height: 100%;
            width: 260px;
            background: linear-gradient(135deg, #0891B2, #06B6D4);
            display: flex;
            flex-direction: column;
            z-index: 30;
            box-shadow: 4px 0 20px rgba(0, 0, 0, 0.08);
            transition: transform 0.3s ease;
        }

        .main-content {
            flex: 1;
            margin-left: 260px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .topbar {
            height: 64px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(203, 213, 225, 0.6);
            padding: 0 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 20;
        }

        .page-title {
            font-size: 1.75rem;
            font-weight: 700;
            color: #111827;
            letter-spacing: -0.02em;
        }

        .menu-toggle {
            display: none;
            width: 40px;
            height: 40px;
            background: rgba(6, 182, 212, 0.1);
            border-radius: 0.75rem;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: none;
        }

        .search-wrapper {
            position: relative;
            width: 280px;
        }

        .search-wrapper input {
            width: 100%;
            height: 40px;
            padding-left: 2.5rem;
            padding-right: 1rem;
            background: linear-gradient(135deg, #ECFEFF, white);
            border: 1px solid rgba(6, 182, 212, 0.25);
            border-radius: 0.75rem;
            font-size: 0.85rem;
            outline: none;
        }

        .search-icon {
            position: absolute;
            left: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            color: #06B6D4;
        }

        .notif-btn {
            width: 40px;
            height: 40px;
            background: linear-gradient(145deg, rgba(34, 211, 238, 0.1), rgba(6, 182, 212, 0.1));
            border-radius: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            border: none;
        }

        .notif-dot {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 8px;
            height: 8px;
            background: #EF4444;
            border-radius: 50%;
            border: 2px solid white;
        }

        .avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #22D3EE, #06B6D4);
            border-radius: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            cursor: pointer;
        }

        .right-section {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .nav-menu {
            flex: 1;
            padding: 1.5rem 0.75rem;
        }

        .nav-item {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            margin-bottom: 0.5rem;
            border-radius: 0.75rem;
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.8);
            transition: all 0.2s;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            text-align: left;
            text-decoration: none;
        }

        .nav-item:hover {
            background: rgba(255, 255, 255, 0.12);
            color: white;
            transform: translateX(4px);
        }

        .nav-item.active {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(4px);
            color: white;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 1.5rem 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.15);
        }

        .logout-section {
            padding: 1rem 0.75rem 1.5rem 0.75rem;
            border-top: 1px solid rgba(255, 255, 255, 0.15);
            margin-top: auto;
        }

        .toast-msg {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: #1e293b;
            color: white;
            padding: 0.6rem 1.5rem;
            border-radius: 2rem;
            font-size: 0.8rem;
            font-weight: 500;
            z-index: 999;
            opacity: 0;
            transform: translateY(10px);
            transition: 0.2s;
            pointer-events: none;
        }

        .toast-msg.show {
            opacity: 1;
            transform: translateY(0);
        }

        .card {
            transition: all 0.3s ease;
        }
        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -10px rgba(0, 0, 0, 0.1);
        }

        .btn-primary {
            transition: all 0.2s ease;
        }
        .btn-primary:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 12px rgba(6, 182, 212, 0.3);
        }

        .status-badge {
            transition: all 0.2s ease;
        }
        .status-badge:hover {
            transform: scale(1.05);
        }

        .action-btn {
            transition: all 0.2s ease;
            cursor: pointer;
            background: none;
            border: none;
            padding: 4px;
        }
        .action-btn:hover {
            transform: scale(1.1);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            background: white;
            border-radius: 24px;
            max-width: 500px;
            width: 90%;
            animation: modalFadeIn 0.3s ease;
        }
        @keyframes modalFadeIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
            }
            .sidebar.open {
                transform: translateX(0);
            }
            .main-content {
                margin-left: 0;
            }
            .menu-toggle {
                display: flex;
            }
            .search-wrapper {
                display: none;
            }
            .page-title {
                font-size: 1.2rem;
            }
            .right-section {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
<div class="app-wrapper">
    <aside class="sidebar" id="sidebar">
        <div class="logo-area">
            <div style="background: rgba(255,255,255,0.2); width: 36px; height: 36px; border-radius: 0.75rem; display: flex; align-items: center; justify-content: center;">
                <i data-lucide="git-branch" style="color:white;" width="20" height="20"></i>
            </div>
            <h1 class="logo-text" style="color:white; font-weight:700; font-size:1.3rem;">Procevia</h1>
        </div>
        
        <nav class="nav-menu">
    <a href="/dashboard" class="nav-item"><i data-lucide="layout-dashboard"></i><span>Dashboard</span></a>
    <a href="/tasks" class="nav-item"><i data-lucide="check-square"></i><span>Tasks</span></a>
    <a href="/workflow" class="nav-item"><i data-lucide="git-branch"></i><span>Workflow</span></a>
    <a href="/users" class="nav-item"><i data-lucide="users"></i><span>Users</span></a>
    <a href="/roles" class="nav-item"><i data-lucide="shield"></i><span>Roles</span></a>
    <a href="/reports" class="nav-item"><i data-lucide="bar-chart-3"></i><span>Reports</span></a>
    <a href="/settings" class="nav-item"><i data-lucide="settings"></i><span>Settings</span></a>
</nav>
        
        <div class="logout-section">
            <a href="/logout" class="nav-item" style="margin-bottom:0;">
                <i data-lucide="log-out"></i>
                <span class="nav-label">Logout</span>
            </a>
        </div>
    </aside>

    <div class="main-content">
        <div class="topbar">
            <button class="menu-toggle" id="menuToggle">
                <i data-lucide="menu" width="20" height="20" style="color:#0891B2;"></i>
            </button>
            <h2 class="page-title">Task Management</h2>
            <div class="right-section">
                <div class="search-wrapper">
                    <i data-lucide="search" class="search-icon" width="18" height="18"></i>
                    <input type="text" id="globalSearch" placeholder="Search tasks...">
                </div>
                <button class="notif-btn" id="notifBtn">
                    <i data-lucide="bell" width="20" height="20" style="color:#0891B2;"></i>
                    <span class="notif-dot"></span>
                </button>
                <div class="avatar" id="avatarBtn">JD</div>
            </div>
        </div>

        <div class="max-w-7xl mx-auto px-4 py-8 w-full">
            <div class="mb-6">
                <button id="createTaskBtn" class="btn-primary bg-gradient-to-r from-cyan-500 to-cyan-600 text-white px-6 py-3 rounded-xl font-semibold shadow-lg flex items-center gap-2">
                    <i data-lucide="plus" width="20" height="20"></i>
                    Create Task
                </button>
            </div>

            <div class="bg-white/80 backdrop-blur-md rounded-2xl border border-gray-200 shadow-lg overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full">
                        <thead>
                            <tr class="border-b border-gray-200 bg-gradient-to-r from-gray-50 to-white">
                                <th class="text-left p-4 text-gray-600 font-semibold text-sm">Task Name</th>
                                <th class="text-left p-4 text-gray-600 font-semibold text-sm">Assignee</th>
                                <th class="text-left p-4 text-gray-600 font-semibold text-sm">Stage</th>
                                <th class="text-left p-4 text-gray-600 font-semibold text-sm">Deadline</th>
                                <th class="text-left p-4 text-gray-600 font-semibold text-sm">Priority</th>
                                <th class="text-left p-4 text-gray-600 font-semibold text-sm">Status</th>
                                <th class="text-left p-4 text-gray-600 font-semibold text-sm">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="tasksTableBody">
                            <tr><td colspan="7" class="p-8 text-center text-gray-500">Loading tasks...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="taskModal" class="modal">
    <div class="modal-content p-6">
        <div class="flex justify-between items-center mb-4">
            <h3 id="modalTitle" class="text-xl font-bold text-gray-800">Create Task</h3>
            <button id="closeModal" class="text-gray-400 hover:text-gray-600">
                <i data-lucide="x" width="24" height="24"></i>
            </button>
        </div>
        <form id="taskForm">
            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-medium mb-2">Task Name *</label>
                <input type="text" id="taskName" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-cyan-500" required>
            </div>
            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-medium mb-2">Description</label>
                <textarea id="taskDescription" rows="3" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-cyan-500"></textarea>
            </div>
            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-medium mb-2">Assignee</label>
                <select id="taskAssignee" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-cyan-500">
                    <option value="">Select assignee...</option>
                </select>
            </div>
            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-medium mb-2">Stage</label>
                <select id="taskStage" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-cyan-500">
                    <option>Planning</option>
                    <option>Development</option>
                    <option>Review</option>
                    <option>Testing</option>
                    <option>Done</option>
                </select>
            </div>
            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-medium mb-2">Deadline *</label>
                <input type="date" id="taskDeadline" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-cyan-500" required>
            </div>
            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-medium mb-2">Priority</label>
                <select id="taskPriority" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-cyan-500">
                    <option>High</option>
                    <option>Medium</option>
                    <option>Low</option>
                </select>
            </div>
            <div class="flex gap-3">
                <button type="submit" class="flex-1 bg-gradient-to-r from-cyan-500 to-cyan-600 text-white py-2 rounded-lg font-semibold">Save</button>
                <button type="button" id="cancelModal" class="flex-1 bg-gray-200 text-gray-700 py-2 rounded-lg font-semibold hover:bg-gray-300">Cancel</button>
            </div>
        </form>
    </div>
</div>

<div id="toastMsg" class="toast-msg"></div>

<script>
lucide.createIcons();

let currentEditId = null;

function showToast(msg, isError = false) {
    const toast = document.getElementById('toastMsg');
    toast.innerText = msg;
    toast.classList.add('show');
    toast.style.background = isError ? '#DC2626' : '#1e293b';
    setTimeout(() => {
        toast.classList.remove('show');
        toast.style.background = '#1e293b';
    }, 2000);
}

// Мобильное меню
const sidebar = document.getElementById('sidebar');
const menuToggle = document.getElementById('menuToggle');
if (menuToggle) {
    menuToggle.addEventListener('click', () => sidebar.classList.toggle('open'));
}

const notifBtn = document.getElementById('notifBtn');
if (notifBtn) {
    notifBtn.addEventListener('click', () => showToast('🔔 No new notifications'));
}

// API функции
async function fetchAPI(endpoint, options = {}) {
    const response = await fetch(endpoint, {
        headers: { 'Content-Type': 'application/json' },
        ...options
    });
    if (!response.ok) throw new Error('Network error');
    return response.json();
}

// Загрузка пользователей
async function loadUsers() {
    try {
        const users = await fetchAPI('/api/users/list');
        const select = document.getElementById('taskAssignee');
        if (select) {
            select.innerHTML = '<option value="">Select assignee...</option>' + 
                users.map(user => `<option value="${user.name}">${user.name}</option>`).join('');
        }
    } catch (error) {
        console.error('Error loading users:', error);
    }
}

// Загрузка задач
async function loadTasks() {
    try {
        const tasks = await fetchAPI('/api/tasks');
        renderTasks(tasks);
    } catch (error) {
        console.error('Error loading tasks:', error);
        showToast('Error loading tasks', true);
        document.getElementById('tasksTableBody').innerHTML = '<tr><td colspan="7" class="p-8 text-center text-red-500">Error loading tasks</td></tr>';
    }
}

function renderTasks(tasks) {
    const tbody = document.getElementById('tasksTableBody');
    const searchTerm = document.getElementById('globalSearch')?.value.toLowerCase() || '';
    
    const filteredTasks = tasks.filter(task => 
        task.name.toLowerCase().includes(searchTerm) || 
        task.assignee.toLowerCase().includes(searchTerm) ||
        task.stage.toLowerCase().includes(searchTerm)
    );
    
    if (filteredTasks.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" class="p-8 text-center text-gray-500">No tasks found</td></tr>';
        return;
    }
    
    tbody.innerHTML = filteredTasks.map(task => {
        const priorityColor = task.priority === 'High' ? 'text-red-600 bg-red-100' : 
                             task.priority === 'Medium' ? 'text-amber-600 bg-amber-100' : 'text-green-600 bg-green-100';
        const statusBadge = task.status === 'Completed' ? 'bg-green-100 text-green-700' :
                           task.status === 'In Progress' ? 'bg-amber-100 text-amber-700' :
                           task.status === 'Overdue' ? 'bg-red-100 text-red-700' : 'bg-gray-100 text-gray-700';
        
        return `
            <tr class="border-b border-gray-100 hover:bg-gradient-to-r hover:from-cyan-50/50 hover:to-transparent transition-all">
                <td class="p-4"><span class="font-medium text-gray-800">${escapeHtml(task.name)}</span></td>
                <td class="p-4">
                    <div class="flex items-center gap-2">
                        <div class="w-8 h-8 rounded-full bg-gradient-to-r from-cyan-400 to-cyan-600 flex items-center justify-center text-white text-xs font-bold shadow-sm">
                            ${task.assignee_initials}
                        </div>
                        <span class="text-gray-700 text-sm">${escapeHtml(task.assignee)}</span>
                    </div>
                </td>
                <td class="p-4"><span class="text-gray-700 text-sm">${escapeHtml(task.stage)}</span></td>
                <td class="p-4">
                    <span class="text-gray-700 text-sm ${task.is_overdue ? 'text-red-600 font-semibold' : ''}">
                        ${task.deadline || 'No date'}
                        ${task.is_overdue ? ' ⚠️' : ''}
                    </span>
                </td>
                <td class="p-4">
                    <span class="px-2 py-1 rounded-full text-xs font-semibold ${priorityColor}">
                        ${task.priority}
                    </span>
                </td>
                <td class="p-4">
                    <span class="status-badge px-3 py-1 rounded-full text-xs font-semibold ${statusBadge}">
                        ${task.status}
                    </span>
                </td>
                <td class="p-4">
                    <div class="flex items-center gap-2">
                        <button class="action-btn text-blue-500 hover:text-blue-700" onclick="editTask(${task.id})" title="Edit">
                            <i data-lucide="edit-2" width="18" height="18"></i>
                        </button>
                        <button class="action-btn text-red-500 hover:text-red-700" onclick="deleteTask(${task.id})" title="Delete">
                            <i data-lucide="trash-2" width="18" height="18"></i>
                        </button>
                    </div>
                </td>
            </tr>
        `;
    }).join('');
    lucide.createIcons();
}

function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

// СОЗДАНИЕ ЗАДАЧИ
async function createTask(taskData) {
    try {
        const result = await fetchAPI('/api/tasks', { 
            method: 'POST', 
            body: JSON.stringify(taskData) 
        });
        if (result.success) {
            showToast('✅ Task created successfully');
            await loadTasks();
            closeModal();
        }
    } catch (error) {
        console.error('Error creating task:', error);
        showToast('Error creating task', true);
    }
}

// ОБНОВЛЕНИЕ ЗАДАЧИ
async function updateTask(taskId, taskData) {
    try {
        const result = await fetchAPI(`/api/tasks/${taskId}`, { 
            method: 'PUT', 
            body: JSON.stringify(taskData) 
        });
        if (result.success) {
            showToast('✅ Task updated successfully');
            await loadTasks();
            closeModal();
        }
    } catch (error) {
        console.error('Error updating task:', error);
        showToast('Error updating task', true);
    }
}

// УДАЛЕНИЕ ЗАДАЧИ
window.deleteTask = async function(taskId) {
    if (confirm('Are you sure you want to delete this task?')) {
        try {
            const result = await fetchAPI(`/api/tasks/${taskId}`, { method: 'DELETE' });
            if (result.success) {
                showToast('🗑️ Task deleted');
                await loadTasks();
            }
        } catch (error) {
            console.error('Error deleting task:', error);
            showToast('Error deleting task', true);
        }
    }
};

// РЕДАКТИРОВАНИЕ ЗАДАЧИ
window.editTask = async function(taskId) {
    try {
        const tasks = await fetchAPI('/api/tasks');
        const task = tasks.find(t => t.id === taskId);
        if (task) {
            currentEditId = taskId;
            document.getElementById('modalTitle').textContent = 'Edit Task';
            document.getElementById('taskName').value = task.name;
            document.getElementById('taskDescription').value = task.description || '';
            document.getElementById('taskAssignee').value = task.assignee;
            document.getElementById('taskStage').value = task.stage;
            document.getElementById('taskDeadline').value = task.deadline;
            document.getElementById('taskPriority').value = task.priority;
            document.getElementById('taskModal').classList.add('active');
            lucide.createIcons();
        }
    } catch (error) {
        console.error('Error loading task for edit:', error);
        showToast('Error loading task', true);
    }
};

// СОХРАНЕНИЕ ЗАДАЧИ
function saveTask() {
    const name = document.getElementById('taskName').value;
    const description = document.getElementById('taskDescription').value;
    const assignee = document.getElementById('taskAssignee').value;
    const stage = document.getElementById('taskStage').value;
    const deadline = document.getElementById('taskDeadline').value;
    const priority = document.getElementById('taskPriority').value;
    
    if (!name || !deadline) {
        showToast('Please fill in required fields', true);
        return;
    }
    
    const taskData = { name, description, assignee: assignee || null, stage, deadline, priority };
    
    if (currentEditId) {
        updateTask(currentEditId, taskData);
    } else {
        createTask(taskData);
    }
}

function openModal() {
    currentEditId = null;
    document.getElementById('modalTitle').textContent = 'Create Task';
    document.getElementById('taskForm').reset();
    document.getElementById('taskDeadline').value = new Date().toISOString().split('T')[0];
    document.getElementById('taskModal').classList.add('active');
    lucide.createIcons();
}

function closeModal() {
    document.getElementById('taskModal').classList.remove('active');
    currentEditId = null;
}

// Загрузка информации о пользователе
async function loadUserInfo() {
    try {
        const userInfo = await fetchAPI('/api/dashboard/user-info');
        const avatarBtn = document.getElementById('avatarBtn');
        if (avatarBtn) avatarBtn.textContent = userInfo.avatar_initials;
    } catch (error) {
        console.error('Error loading user info:', error);
    }
}

// Обработчики событий
document.getElementById('createTaskBtn').onclick = openModal;
document.getElementById('closeModal').onclick = closeModal;
document.getElementById('cancelModal').onclick = closeModal;
document.getElementById('taskForm').onsubmit = (e) => { e.preventDefault(); saveTask(); };
document.getElementById('globalSearch').oninput = () => loadTasks();
