<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  min-height: 100vh;
  background: linear-gradient(135deg, #06B6D4, #22D3EE, #67E8F9);
  display: flex;
  align-items: center;
  justify-content: center;
}

.wrapper {
  width: 100%;
  padding: 16px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  min-height: 100vh;
}

.card {
  width: 100%;
  background: rgba(255,255,255,0.97);
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 15px 40px rgba(0,0,0,0.15);
}

.header {
  padding: 28px 20px;
  text-align: center;
  background: linear-gradient(to right, #06B6D4, #22D3EE);
  color: white;
}

.logo {
  width: 50px;
  height: 50px;
  border-radius: 14px;
  margin: auto;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(255,255,255,0.2);
  font-size: 20px;
}

.header h1 {
  margin: 0;
  font-size: 22px;
}

.header p {
  margin-top: 5px;
  font-size: 13px;
  opacity: 0.9;
}

.form {
  padding: 24px 20px;
}

.form h2 {
  text-align: center;
  margin-bottom: 20px;
  font-size: 20px;
}

.input-group {
  margin-bottom: 16px;
}

.input-group label {
  display: block;
  font-size: 13px;
  margin-bottom: 5px;
}

.input-group input, .input-group select {
  width: 100%;
  height: 46px;
  padding: 0 12px;
  border-radius: 10px;
  border: 2px solid #e5e7eb;
  font-size: 14px;
  background: white;
}

.input-group select {
  cursor: pointer;
}

.input-group input:focus, .input-group select:focus {
  border-color: #22D3EE;
  box-shadow: 0 0 0 3px rgba(34,211,238,0.2);
  outline: none;
}

button {
  width: 100%;
  height: 46px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(to right, #06B6D4, #22D3EE);
  color: white;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  margin-top: 8px;
}

.footer {
  text-align: center;
  margin-top: 12px;
}

.footer a {
  font-size: 13px;
  color: #0891B2;
  text-decoration: none;
}

.bottom-text {
  text-align: center;
  color: white;
  margin-top: 16px;
  font-size: 12px;
}

.flash {
  padding: 12px;
  margin-bottom: 16px;
  border-radius: 10px;
  font-size: 13px;
  text-align: center;
}

.flash.success {
  background: #d4edda;
  color: #155724;
  border: 1px solid #c3e6cb;
}

.flash.danger {
  background: #f8d7da;
  color: #721c24;
  border: 1px solid #f5c6cb;
}

.flash.info {
  background: #d1ecf1;
  color: #0c5460;
  border: 1px solid #bee5eb;
}

@media (min-width: 600px) {
  .wrapper {
    align-items: center;
  }
  .card {
    max-width: 420px;
    border-radius: 24px;
  }
  .header {
    padding: 32px 24px;
  }
  .form {
    padding: 28px 24px;
  }
}

@media (min-width: 1024px) {
  body {
    overflow: hidden;
  }
  .wrapper {
    max-width: 1200px;
  }
  .card {
    max-width: 440px;
    margin: auto;
    box-shadow: 0 30px 80px rgba(0,0,0,0.2);
  }
  body::before,
  body::after {
    content: '';
    position: absolute;
    border-radius: 50%;
    filter: blur(120px);
    background: rgba(255,255,255,0.25);
    z-index: 0;
  }
  body::before {
    width: 350px;
    height: 350px;
    top: 10%;
    left: 10%;
  }
  body::after {
    width: 500px;
    height: 500px;
    bottom: 10%;
    right: 10%;
  }
}
</style>
</head>

<body>

<div class="wrapper">
  <div class="card">

    <div class="header">
      <div class="logo">🌿</div>
      <h1>Procevia</h1>
      <p>Create Account</p>
    </div>

    <form class="form" method="POST" action="/register">
      <h2>Register</h2>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
          <div class="flash {{ category }}">{{ message }}</div>
        {% endfor %}
      {% endwith %}

      <div class="input-group">
        <label>Username</label>
        <input type="text" name="username" required placeholder="Choose a username">
      </div>

      <div class="input-group">
        <label>Email Address</label>
        <input type="email" name="email" required placeholder="Enter your email">
      </div>

      <div class="input-group">
        <label>Password</label>
        <input type="password" name="password" required placeholder="Create a password">
      </div>

      <div class="input-group">
        <label>Role</label>
        <select name="role">
          <option value="user">Team Member</option>
          <option value="admin">Manager/Admin</option>
        </select>
      </div>

      <button type="submit">✨ Create Account</button>

      <div class="footer">
        <a href="/login">Already have an account? Sign in</a>
      </div>
    </form>

  </div>

  <p class="bottom-text">© 2026 Procevia</p>
</div>

</body>
</html>
