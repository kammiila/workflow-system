<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  min-height: 100vh;
  background: linear-gradient(135deg, #06B6D4, #22D3EE, #67E8F9);
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Wrapper */
.wrapper {
  width: 100%;
  padding: 16px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  min-height: 100vh;
}

/* Card */
.card {
  width: 100%;
  background: rgba(255,255,255,0.97);
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 15px 40px rgba(0,0,0,0.15);
}

/* Header */
.header {
  padding: 28px 20px;
  text-align: center;
  background: linear-gradient(to right, #06B6D4, #22D3EE);
  color: white;
}

.logo {
  width: 50px;
  height: 50px;
  border-radius: 14px;
  margin: auto;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(255,255,255,0.2);
  font-size: 20px;
}

.header h1 {
  margin: 0;
  font-size: 22px;
}

.header p {
  margin-top: 5px;
  font-size: 13px;
  opacity: 0.9;
}

/* Form */
.form {
  padding: 24px 20px;
}

.form h2 {
  text-align: center;
  margin-bottom: 20px;
  font-size: 20px;
}

/* Inputs */
.input-group {
  margin-bottom: 16px;
}

.input-group label {
  display: block;
  font-size: 13px;
  margin-bottom: 5px;
}

.input-group input {
  width: 100%;
  height: 46px;
  padding: 0 12px;
  border-radius: 10px;
  border: 2px solid #e5e7eb;
  font-size: 14px;
}

.input-group input:focus {
  border-color: #22D3EE;
  box-shadow: 0 0 0 3px rgba(34,211,238,0.2);
  outline: none;
}

/* Button */
button {
  width: 100%;
  height: 46px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(to right, #06B6D4, #22D3EE);
  color: white;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
}

/* Footer */
.footer {
  text-align: center;
  margin-top: 12px;
}

.footer a {
  font-size: 13px;
  color: #0891B2;
  text-decoration: none;
}

/* Bottom text */
.bottom-text {
  text-align: center;
  color: white;
  margin-top: 16px;
  font-size: 12px;
}

/* ===== TABLET ===== */
@media (min-width: 600px) {
  .wrapper {
    align-items: center;
  }

  .card {
    max-width: 420px;
    border-radius: 24px;
  }

  .header {
    padding: 32px 24px;
  }

  .form {
    padding: 28px 24px;
  }
}

/* ===== DESKTOP ===== */
@media (min-width: 1024px) {
  body {
    overflow: hidden;
  }

  .wrapper {
    max-width: 1200px;
  }

  .card {
    max-width: 440px;
    margin: auto;
    box-shadow: 0 30px 80px rgba(0,0,0,0.2);
  }

  /* Decorative circles only on desktop */
  body::before,
  body::after {
    content: '';
    position: absolute;
    border-radius: 50%;
    filter: blur(120px);
    background: rgba(255,255,255,0.25);
    z-index: 0;
  }

  body::before {
    width: 350px;
    height: 350px;
    top: 10%;
    left: 10%;
  }

  body::after {
    width: 500px;
    height: 500px;
    bottom: 10%;
    right: 10%;
  }
}
</style>
</head>

<body>

<div class="wrapper">
  <div class="card">

    <div class="header">
      <div class="logo">🌿</div>
      <h1>Procevia</h1>
      <p>Workflow Management System</p>
    </div>

    <form class="form" id="loginForm">
      <h2>Welcome Back</h2>

      <div class="input-group">
        <label>Email Address</label>
        <input type="email" required placeholder="Enter your email">
      </div>

      <div class="input-group">
        <label>Password</label>
        <input type="password" required placeholder="Enter your password">
      </div>

      <button type="submit">✨ Sign In</button>

      <div class="footer">
        <a href="#">Forgot password?</a>
      </div>
    </form>

  </div>

  <p class="bottom-text">© 2026 Procevia</p>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', function(e) {
  e.preventDefault();
  window.location.href = 'dashboard.html';
});
</script>

</body>
</html>
